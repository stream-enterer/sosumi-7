    detail: >
      Major missing systems: RawVisitAbs coordinate math, SVP computation,
      per-panel viewing flags, input dispatch through VIF chain, SetViewFlags
      with side-effects, directional navigation (10 Visit* methods), background
      color, focus/signal/engine systems, ViewPort abstraction.
    severity: CRITICAL
    rust_file: zuicchini/src/panel/view.rs
    skip_reason: >
      Entire subsystem needs design. Too many interrelated missing features
      to classify individually. Needs a design document for View architecture.

  - id: VIEW-002
    classification: DESIGN
    source_verdict: emView.yaml
    issue: "visit_fullsized uses relA=1.0 instead of computing proper fit"
    detail: >
      C++ uses relA=0.0 which triggers CalcVisitFullsizedCoords to compute
      proper fit. Rust uses relA=1.0 (identity zoom).
    severity: BEHAVIORAL
    rust_file: zuicchini/src/panel/view.rs
    rust_fn: View::visit_fullsized
    rust_lines: "125"
    skip_reason: "Requires CalcVisitFullsizedCoords to be implemented first."

  - id: VIEW-003
    classification: DESIGN
    source_verdict: emView.yaml
    issue: "zoom center_x/center_y params are ignored"
    detail: >
      View::zoom accepts center_x, center_y but they are prefixed with
      underscore and unused. Zoom always scales rel_a without compensating
      scroll.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/panel/view.rs
    rust_fn: View::zoom
    rust_lines: "146"
