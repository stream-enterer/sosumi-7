  - id: VIEW-004
    classification: DESIGN
    source_verdict: emView.yaml
    issue: "is_visible returns user-set flag, not computed viewport intersection"
    detail: >
      C++ IsViewed is computed from viewport intersection. Rust is_visible
      returns a user-set visibility flag. Fundamentally different concepts.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/panel/view.rs
    skip_reason: >
      Viewport intersection requires SVP system and per-panel viewing flags,
      which are part of the broader View architecture redesign.

