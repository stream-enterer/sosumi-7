animator:
  - id: ANIM-001
    classification: BUG
    source_verdict: emViewAnimator.yaml
    issue: "SpeedingViewAnimator idle check uses exact float equality on target"
    detail: >
      Rust compares target_vx == 0.0 && target_vy == 0.0 using exact float
      equality. C++ uses GetAbsTargetVelocity() > 0.01. Any epsilon-small
      target keeps the animator active forever.
    severity: MINOR
    rust_file: zuicchini/src/panel/animator.rs
    rust_fn: SpeedingViewAnimator::animate
    fix_hint: "Use threshold check (abs(target_vx) + abs(target_vy) < 0.01)."

  - id: ANIM-002
    classification: BUG
    source_verdict: emViewAnimator.yaml
    issue: "VisitingViewAnimator convergence check uses stale pre-scroll state"
    detail: >
      Convergence test checks the OLD visit state (before scroll/zoom) against
      target. Animator always runs one extra frame after convergence.
    severity: MINOR
    rust_file: zuicchini/src/panel/animator.rs
    rust_fn: VisitingViewAnimator::animate
    fix_hint: "Check convergence after applying scroll/zoom, not before."

  - id: ANIM-003
    classification: DESIGN
    source_verdict: emViewAnimator.yaml
    issue: "Friction model is fundamentally different (exponential decay vs linear drag)"
    detail: >
      C++ uses linear drag (v -= a*dt). Rust uses exponential decay
      (v *= (1-f)^(dt*60)). Different deceleration feel.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/panel/animator.rs
    skip_reason: >
      Both models are valid. The feel difference is subjective. Requires
      playtesting to decide which to use.

  - id: ANIM-004
    classification: DESIGN
    source_verdict: emViewAnimator.yaml
    issue: "No zoom (3rd) dimension in any animator"
    detail: >
      C++ velocity is 3D (scroll-x, scroll-y, zoom). Rust is 2D only.
      Zoom animation is absent.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/panel/animator.rs
    skip_reason: >
      Adding zoom dimension requires coordinating with View::zoom() and
      the visit state. Part of the broader View architecture.

# ============================================================================
# MODULE: zuicchini/src/render/painter.rs
# ============================================================================

painter:
  - id: PAINT-001
    classification: DESIGN
    source_verdict: emPainter_primitives.yaml
    issue: "No sub-pixel anti-aliasing on any primitive"
    detail: >
      C++ uses 12-bit fixed-point for sub-pixel precision with graduated alpha
      on first/last rows/columns. Rust uses integer pixel coordinates with hard
      boundaries. Visible aliasing at all scales.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/render/painter.rs
    skip_reason: >
      Anti-aliasing is a fundamental rendering architecture decision. Adding it
      requires redesigning the scanline pipeline. May not be needed if GPU
      rendering is planned.

  - id: PAINT-002
    classification: DESIGN
    source_verdict: emPainter_primitives.yaml
    issue: "PaintPolygon uses even-odd fill rule instead of non-zero winding"
    detail: >
      C++ uses non-zero winding rule. Rust uses even-odd (chunks of 2
      intersections). Different output for self-intersecting polygons and
      polygons with holes.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: Painter::paint_polygon
    skip_reason: >
      Fill rule affects complex polygon rendering. Need to assess which
      polygons in the actual UI use self-intersection or winding.

  - id: PAINT-003
    classification: DESIGN
    source_verdict: emPainter_primitives.yaml
    issue: "Transform model uses relative (additive/multiplicative) instead of absolute set"
    detail: >
      C++ SetOrigin/SetScaling set absolute values. Rust translate()/scale()
      are relative operations. Code ported from C++ will produce different results.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: "Painter::translate, Painter::scale"
    skip_reason: >
      Relative transforms are a valid design. Whether to add absolute-set
      methods depends on how many callers need them.

  - id: PAINT-004
    classification: DESIGN
    source_verdict: emPainter_lines.yaml
    issue: "PaintSolidPolyline: no join handling, no caps, no closed polyline support"
    detail: >
      paint_thick_line handles single segments only. No miter/bevel/round joins.
      No butt/cap/round end caps. No closed polyline (NO_END) support.
      Segments have gaps/overlaps at corners.
    severity: CRITICAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: "Painter::paint_thick_line, Painter::paint_polyline"
    skip_reason: >
      Full polyline rendering is a complex feature (~300 lines in C++).
      Needs design decision on scope: full C++ fidelity vs simplified joins.

  - id: PAINT-005
    classification: DESIGN
    source_verdict: emPainter_lines.yaml
    issue: "PaintRectOutline: 4-rect approach has alpha overlap at corners"
    detail: >
      Rust draws 4 separate rectangles for rect outline. With semi-transparent
      stroke colors, corners are double-blended. C++ avoids this with a
      10-vertex polygon ring.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: Painter::paint_rect_outlined
    skip_reason: >
      Fixing requires either polygon ring approach or special corner handling.
      Impact depends on whether semi-transparent outlines are used in the game.

  - id: PAINT-006
    classification: DESIGN
    source_verdict: emPainter_primitives.yaml
    issue: "PaintEllipseSector: no normalization for negative sweep or full-circle case"
    detail: >
      C++ normalizes negative sweep angles and delegates to PaintEllipse for
      full circles. Rust does neither. Negative sweep or >360 sweep produces
      incorrect results.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: Painter::paint_ellipse_sector
    skip_reason: >
      Simple fix but unclear if any caller passes negative or >360 sweep.
      Need to check actual callers before deciding.

  - id: PAINT-007
    classification: DESIGN
    source_verdict: emPainter_arrows.yaml
    issue: "paint_stroke_end: contour variants lack contour offset (s) computation"
    detail: >
      C++ adjusts contour shape vertices by stroke half-width with miter
      correction. Rust draws contour variants at same size as filled variants.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: Painter::paint_stroke_end
    skip_reason: >
      Contour offset requires miter computation which is unimplemented.
      Full solution needs MaxMiter, sinA calculation, and rounded flag handling.

  - id: PAINT-008
    classification: DESIGN
    source_verdict: emPainter_ScTl_interpolation.yaml
    issue: "Only axis-aligned gradients; no radial gradient; no image interpolation quality modes"
    detail: >
      Missing: arbitrary-direction linear gradients, radial gradients entirely,
      bilinear/bicubic/lanczos/adaptive interpolation, area-sampled filtering,
      extension modes (tiled/zero).
    severity: CRITICAL
    rust_file: zuicchini/src/render/painter.rs
    skip_reason: >
      Entire interpolation pipeline is ~5% implemented. Massive scope.
      Needs design decision on whether to port C++ fixed-point pipeline
      or use a different approach (GPU, existing crate, etc.).

  - id: PAINT-009
    classification: DESIGN
    source_verdict: emPainter_ScTl_blending.yaml
    issue: "No sub-pixel anti-aliasing opacity (three-segment opacity missing)"
    detail: >
      C++ PaintScanlineCol uses opacityBeg/opacity/opacityEnd for graduated
      edge coverage. Rust blend_pixel uses single global alpha for all pixels.
    severity: CRITICAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: Painter::blend_pixel
    skip_reason: >
      Same as PAINT-001. Anti-aliasing is an architectural decision.

  - id: PAINT-010
    classification: DESIGN
    source_verdict: emPainter_lines.yaml
    issue: "PaintImage: 1:1 only, no scaling"
    detail: >
      C++ PaintImage maps image into destination rectangle with arbitrary scaling
      via emImageTexture. Rust always paints at source pixel size.
    severity: CRITICAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: Painter::paint_image
    skip_reason: >
      Image scaling requires interpolation pipeline (PAINT-008).

  - id: PAINT-011
    classification: DESIGN
    source_verdict: emPainter_lines.yaml
    issue: "PaintImageColored: single-color alpha mask instead of two-color gradient"
    detail: >
      C++ takes two colors and interpolates based on image luminance. Rust takes
      single color and modulates alpha only.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/render/painter.rs
    rust_fn: Painter::paint_image_colored
    skip_reason: >
      Two-color gradient blitting has specific callers (emBorder TGA images).
      Since TGA border images are not used, this may not be needed.

