border:
  - id: BORDER-001
    classification: DESIGN
    source_verdict: emBorder.yaml
    issue: "All geometry uses fixed pixel insets instead of proportional (BorderScaling-based)"
    detail: >
      C++ uses dynamic proportional insets: d=min(1,h)*BorderScaling*0.04,
      s*0.023, s*0.22, etc. Rust uses fixed 1.0, 2.0, 3.0, 4.0, 6.0 pixel
      values. 17 constants differ. Whether to match C++ proportional geometry
      or keep fixed pixels is a design decision.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/widget/border.rs
    skip_reason: >
      Multiple valid approaches (proportional vs fixed). Requires human decision
      on visual style target. C++ values depend on BorderScaling which is also
      unimplemented.

  - id: BORDER-002
    classification: DESIGN
    source_verdict: emBorder.yaml
    issue: "No disabled state handling (75% transparency on fg, 80% blend on field bg)"
    detail: >
      C++ applies transparency when !IsEnabled(). Rust has no disabled dimming
      in border painting.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/widget/border.rs
    skip_reason: >
      Depends on whether disabled state visual feedback is needed for the game.
      Requires knowing which widgets use disabled state.

  - id: BORDER-003
    classification: DESIGN
    source_verdict: emBorder.yaml
    issue: "Round rect outlines drawn as rectangular outlines (3 border types)"
    detail: >
      OBT_ROUND_RECT, OBT_INSTRUMENT, OBT_INSTRUMENT_MORE_ROUND use
      paint_rect_outlined instead of round rect outline. The outline should
      follow the rounded shape.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/widget/border.rs
    skip_reason: >
      Depends on whether paint_round_rect_outlined exists or needs to be added
      to the painter first. Cross-module dependency with painter.

  - id: BORDER-004
    classification: DESIGN
    source_verdict: emBorder.yaml
    issue: "No icon support in label painting"
    detail: >
      C++ DoLabel handles icons with layout options. Rust has no icon support.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/widget/border.rs
    skip_reason: "Icon support requires image loading pipeline; scope TBD."

  - id: BORDER-005
    classification: DESIGN
    source_verdict: emBorder.yaml
    issue: "No alignment options for caption/description"
    detail: >
      C++ supports CaptionAlignment/DescriptionAlignment. Rust uses fixed
      left-aligned position (ox+2.0).
    severity: BEHAVIORAL
    rust_file: zuicchini/src/widget/border.rs
    skip_reason: "Alignment is a polish feature; depends on whether callers need it."

# ============================================================================
# MODULE: zuicchini/src/layout/ (mod.rs, linear.rs, raster.rs, pack.rs)
# ============================================================================

layout:
  - id: LAYOUT-001
    classification: DESIGN
    source_verdict: emLayout.yaml
    issue: "LinearLayout: tallness constraints not applied to main axis"
    detail: >
      C++ LayoutChildren applies min/max tallness constraints per child during
      main-axis sizing. Rust do_layout uses min_main/max_main (direct pixel
      constraints) instead of tallness ratios. ChildConstraint has min_tallness/
      max_tallness fields but they are NOT used in LinearLayout::do_layout.
    severity: MEDIUM
    rust_file: zuicchini/src/layout/linear.rs
    rust_fn: LinearLayout::do_layout
    skip_reason: >
      C++ tallness constraints interact with CalculateForce iterative solver.
      Porting these requires deciding whether to match the C++ iterative
      algorithm or keep the simpler single-pass approach.

  - id: LAYOUT-002
    classification: DESIGN
    source_verdict: emLayout.yaml
    issue: "LinearLayout: spacing model uses absolute pixels instead of relative proportions"
    detail: >
      C++ uses relative spacing (SpaceL/T/H/V/R/B as proportions converted to
      pixels). Rust uses absolute pixel spacing. C++ spacing scales with panel
      size; Rust spacing is fixed.
    severity: MEDIUM
    rust_file: zuicchini/src/layout/linear.rs
    rust_fn: LinearLayout::do_layout
    skip_reason: >
      Proportional vs absolute spacing is a design choice. Proportional is more
      faithful to C++ but absolute may be preferred for the game UI.

  - id: LAYOUT-003
    classification: DESIGN
    source_verdict: emLayout.yaml
    issue: "RasterLayout defaults differ from C++ (PrefCT 0.2 vs 1.0, alignment Center vs Stretch, etc.)"
    detail: >
      Multiple default value differences: PrefCT 0.2 vs 1.0, MinCT 1E-4 vs 0,
      MaxCT 1E4 vs INFINITY, RowByRow false vs true, alignment Center vs Stretch.
    severity: LOW
    rust_file: zuicchini/src/layout/raster.rs
    rust_fn: RasterLayout::new
    skip_reason: >
      Whether to match C++ defaults or keep Rust defaults is a design choice.
      Callers can override all defaults explicitly.

  - id: LAYOUT-004
    classification: DESIGN
    source_verdict: emLayout.yaml
    issue: "RasterLayout: log-error vs linear-error auto-grid scoring"
    detail: >
      C++ uses log-error metric |log(prefCT/ct)| which is scale-invariant.
      Rust auto_grid uses linear error |tallness - preferred_child_tallness|.
      Different column counts may be selected for extreme tallness ratios.
    severity: MEDIUM
    rust_file: zuicchini/src/layout/raster.rs
    rust_fn: RasterLayout::do_layout
    skip_reason: "Whether log-error scoring matters depends on actual UI usage patterns."

  - id: LAYOUT-005
    classification: DESIGN
    source_verdict: emLayout.yaml
    issue: "PackLayout: score_rect uses linear absolute difference instead of ratio-cubed scoring"
    detail: >
      C++ RateCell uses (actual/preferred) ratio, inverts if <1, cubes,
      subtracts 1. Scale-invariant. Rust uses |actual - preferred|. Not
      scale-invariant. Can produce significantly different pack arrangements.
    severity: MEDIUM
    rust_file: zuicchini/src/layout/pack.rs
    rust_fn: PackLayout::score_rect
    skip_reason: >
      Score function change would affect all pack layouts. Needs visual testing
      to determine if C++ scoring produces better results for actual UI content.

  - id: LAYOUT-006
    classification: DESIGN
    source_verdict: emLayout.yaml
    issue: "PackLayout: default preferred_tallness=1.0 vs C++ DefaultPCT=0.2"
    detail: >
      Different default target aspect ratios. C++ packs for landscape (0.2);
      Rust packs for square (1.0).
    severity: LOW
    rust_file: zuicchini/src/layout/pack.rs
    rust_fn: PackLayout::new
    skip_reason: "Callers can set preferred_tallness explicitly; default choice is a design call."

  - id: LAYOUT-007
    classification: DESIGN
    source_verdict: emLayout.yaml
    issue: "RasterLayout: alignment field exists but has no effect in do_layout"
    detail: >
      RasterLayout has an alignment field but do_layout does not use it.
      C++ applies alignment per-cell within available space.
    severity: MEDIUM
    rust_file: zuicchini/src/layout/raster.rs
    rust_fn: RasterLayout::do_layout
    skip_reason: "Dead code field; needs decision on whether to wire it up or remove it."

