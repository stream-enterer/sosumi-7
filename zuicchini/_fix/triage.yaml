# ============================================================================
# MODULE: zuicchini/src/scheduler/core.rs
# ============================================================================

scheduler_core:
  - id: SCHED-001
    classification: BUG
    source_verdict: emScheduler.yaml
    issue: "Clock incremented twice per engine dispatch instead of once per outer loop iteration"
    detail: >
      C++ increments Clock once at top of outer loop. Rust increments at line 249
      (top of loop) AND at line 322 (after engine cycle). Each engine dispatch
      consumes two clock ticks instead of one. Absolute clock values diverge.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/scheduler/core.rs
    rust_lines: "249, 322"
    rust_fn: EngineScheduler::do_time_slice
    fix_hint: "Remove the second clock increment at line 322."

  - id: SCHED-002
    classification: BUG
    source_verdict: emScheduler.yaml
    issue: "time_slice_counter() returns clock instead of dedicated counter"
    detail: >
      C++ increments TimeSliceCounter once per DoTimeSlice call. Rust
      time_slice_counter() returns self.inner.clock which increments multiple
      times per time slice. Callers expecting a monotonic once-per-slice counter
      get inflated values.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/scheduler/core.rs
    rust_lines: "349-351"
    rust_fn: EngineScheduler::time_slice_counter
    fix_hint: "Add a dedicated time_slice_counter field, increment once at top of do_time_slice."

# ============================================================================
# MODULE: zuicchini/src/scheduler/timer.rs
# ============================================================================

scheduler_timer:
  - id: TIMER-001
    classification: BUG
    source_verdict: emSignal_emTimer.yaml
    issue: "No 1ms minimum clamp for periodic timers with interval_ms=0"
    detail: >
      C++ clamps Period to 1 for periodic timers with millisecs=0. Rust stores
      interval_ms=0 as-is. A periodic timer with interval_ms=0 fires every
      check_and_collect call without the 1ms floor.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/scheduler/timer.rs
    rust_lines: "42-44"
    rust_fn: TimerCentral::create_timer
    fix_hint: "Clamp interval_ms to max(interval_ms, 1) when periodic=true."

  - id: TIMER-002
    classification: MISSING_BRANCH
    source_verdict: emSignal_emTimer.yaml
    issue: "cancel_timer lacks abortSignal parameter"
    detail: >
      C++ Stop takes abortSignal bool to optionally abort the timer's signal.
      Rust cancel_timer only sets active=false with no signal abort.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/scheduler/timer.rs
    rust_lines: "51-52"
    rust_fn: TimerCentral::cancel_timer
    fix_hint: "Add abort_signal parameter; if true, call scheduler.abort(signal_id)."

  - id: TIMER-003
    classification: MISSING_METHOD
    source_verdict: emSignal_emTimer.yaml
    issue: "IsRunning() not exposed as public API"
    detail: >
      TimerEntry::active field exists but is not exposed. C++ has public
      IsRunning() that checks Node.Prev != NULL.
    severity: BEHAVIORAL
    rust_file: zuicchini/src/scheduler/timer.rs
    rust_fn: "(needs new method)"
    fix_hint: "Add pub fn is_running(&self, id: TimerId) -> bool method."

# ============================================================================
# MODULE: zuicchini/src/widget/text_field.rs
# ============================================================================

text_field:
  - id: TF-001
    classification: BUG
    source_verdict: emTextField.yaml
    issue: "Double undo entry on type-over selection"
    detail: >
      save_undo() called at line 231 BEFORE delete_selection() at line 232.
      delete_selection() internally calls save_undo() again at line 282 when
      selection is non-empty. Two undo snapshots for one atomic operation.
      User must press undo twice to revert a type-over.
    severity: MEDIUM
    rust_file: zuicchini/src/widget/text_field.rs
    rust_lines: "229-244"
    rust_fn: TextField::input
    fix_hint: >
      Extract drain logic from delete_selection into a helper that does NOT call
      save_undo. Call save_undo once, then the drain helper, then insert char.

  - id: TF-002
    classification: BUG
    source_verdict: emTextField.yaml
    issue: "Selected text foreground color not swapped to bg"
    detail: >
      C++ uses bgColor as foreground for selected text (fg/bg swap). Rust paints
      ALL text with input_fg_color regardless of selection state. Selected text
      may be unreadable if input_fg_color and input_hl_color have low contrast.
    severity: MEDIUM
    rust_file: zuicchini/src/widget/text_field.rs
    rust_lines: "145-151"
    rust_fn: TextField::paint
    fix_hint: >
      Paint selected text range with input_bg_color as foreground. Split text
      rendering into unselected and selected passes.

  - id: TF-003
    classification: MISSING_BRANCH
    source_verdict: emTextField.yaml
    issue: "set_text does not clear undo/redo stacks"
    detail: >
      C++ SetText clears all undo and redo entries. Rust set_text does not
      clear undo_stack or redo_stack. User can undo past a programmatic set.
    severity: MEDIUM
    rust_file: zuicchini/src/widget/text_field.rs
    rust_lines: "60-64"
    rust_fn: TextField::set_text
    fix_hint: "Add self.undo_stack.clear(); self.redo_stack.clear(); to set_text."

# ============================================================================
# MODULE: zuicchini/src/panel/tree.rs
# ============================================================================

panel_tree:
  - id: PANEL-001
    classification: BUG
    source_verdict: emPanel.yaml
    issue: "create_child does not inherit parent enabled state"
    detail: >
      C++ sets child Enabled = parent->Enabled. Rust create_child initializes
      enabled=true unconditionally. If parent is disabled, newly created child
      will incorrectly appear enabled until next recompute_enabled call.
    severity: CRITICAL
    rust_file: zuicchini/src/panel/tree.rs
    rust_fn: PanelTree::create_child
    fix_hint: >
      After creating child, set child.enabled = parent.enabled.
      Or call recompute_enabled on the new child.

  - id: PANEL-002
    classification: BUG
    source_verdict: emPanel.yaml
    issue: "create_root silently overwrites existing root without error"
    detail: >
      C++ emFatalError if RootPanel already exists. Rust create_root silently
      overwrites self.root with new panel ID, orphaning the previous root
      without removing it from the arena.
    severity: CRITICAL
    rust_file: zuicchini/src/panel/tree.rs
    rust_fn: PanelTree::create_root
    fix_hint: >
      Add assertion/panic when self.root.is_some(). Or remove old root first.

  - id: PANEL-003
    classification: MISSING_BRANCH
    source_verdict: emPanel.yaml
    issue: "set_layout_rect missing width/height minimum clamp (1E-100)"
    detail: >
      C++ clamps LayoutWidth and LayoutHeight to 1E-100 minimum to prevent
      division by zero. Rust stores values as-is. Zero width/height causes
      division by zero when computing tallness.
    severity: CRITICAL
    rust_file: zuicchini/src/panel/tree.rs
    rust_fn: PanelTree::set_layout_rect
    fix_hint: "Clamp w and h to f64::MIN_POSITIVE or 1e-100 before storing."

  - id: PANEL-004
    classification: MISSING_BRANCH
    source_verdict: emPanel.yaml
    issue: "set_layout_rect always sets LAYOUT_CHANGED even when rect unchanged"
    detail: >
      C++ checks if geometry is unchanged and returns early. Rust always
      overwrites and sets LAYOUT_CHANGED, causing unnecessary layout_children calls.
    severity: MEDIUM
    rust_file: zuicchini/src/panel/tree.rs
    rust_fn: PanelTree::set_layout_rect
    fix_hint: "Compare old and new rect values; skip notification if unchanged."

  - id: PANEL-005
    classification: MISSING_BRANCH
    source_verdict: emPanel.yaml
    issue: "set_focusable missing root unfocusable guard and active panel migration"
    detail: >
      C++ prevents root from becoming unfocusable and moves activation to parent
      when active panel becomes unfocusable. Rust simply sets the flag.
    severity: MEDIUM
    rust_file: zuicchini/src/panel/tree.rs
    rust_fn: PanelCtx::set_focusable
    fix_hint: >
      Guard against making root unfocusable. When unfocusing the active panel,
      walk up to nearest focusable ancestor.

