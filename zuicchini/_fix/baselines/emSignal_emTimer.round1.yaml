# =============================================================================
# emSignal
# =============================================================================

- method: emSignal::emSignal
  all_correct: true
  # SignalData::new() sets pending=false, connected_engines=Vec::new(), clock=0
  # Equivalent to C++ RNode.Next=NULL, ELFirst=NULL, Clock=0

- method: emSignal::~emSignal
  branches:
    - branch: "while (ELFirst) — drain engine links"
      rust_handles: YES
      evidence: >
        core.rs:71: self.abort(id); then core.rs:72: self.inner.signals.remove(id)
        drops the SignalData including its connected_engines Vec. Engine links are
        stored solely on the signal side (Vec<SignalConnection>), so dropping the
        Vec severs all connections.
      severity: CORRECT
  edge_cases:
    - edge_case: "ELFirst already NULL — while-loop body never executes"
      rust_handles: YES
      evidence: >
        If connected_engines is empty, dropping the Vec is a no-op. abort() handles
        the case where pending is already false.

- method: emSignal::Signal (fire)
  branches:
    - branch: "!RNode.Next — signal not yet pending"
      rust_handles: YES
      evidence: "core.rs:49: if !sig.pending { sig.pending = true; self.inner.pending_signals.push(id); }"
      severity: CORRECT
    - branch: "RNode.Next is non-NULL — already pending, no-op"
      rust_handles: YES
      evidence: "core.rs:49: the if !sig.pending guard skips the push when already pending"
      severity: CORRECT
  edge_cases:
    - edge_case: "Calling Signal multiple times before processing has no additional effect"
      rust_handles: YES
      evidence: "Idempotent: sig.pending bool prevents duplicate pushes to pending_signals"

- method: emSignal::IsPending
  all_correct: true
  # core.rs:58: self.inner.signals.get(id).is_some_and(|s| s.pending)

- method: emSignal::Abort
  branches:
    - branch: "RNode.Next is non-NULL — signal is pending, enter ring-walk to splice out"
      rust_handles: YES
      evidence: >
        core.rs:63-64: sets sig.pending = false;
        core.rs:66: self.inner.pending_signals.retain(|&s| s != id) removes from pending list
      severity: CORRECT
    - branch: "RNode.Next is NULL — signal not pending, skip ring removal"
      rust_handles: YES
      evidence: >
        core.rs:63-64: setting pending=false on an already-false bool is harmless;
        retain() is a no-op if id is not in the Vec
      severity: CORRECT
  edge_cases:
    - edge_case: "Ring contains only this RNode (self-loop)"
      rust_handles: YES
      evidence: "Vec::retain handles single-element and empty cases correctly"
    - edge_case: "Two-at-a-time ring advancement for even/odd lengths"
      rust_handles: YES
      evidence: "N/A — Rust uses Vec::retain, no ring data structure"
  state_mutations:
    - mutation: "RNode.Next = NULL (no longer pending)"
      rust_handles: YES
      evidence: "core.rs:64: sig.pending = false"
      severity: CORRECT
    - mutation: "Clock = 0 (reset signal timestamp)"
      rust_handles: NO
      evidence: >
        Rust abort() does NOT reset sig.clock to 0. The mapping notes acknowledge
        this: 'C++ also resets Clock to 0; Rust does not.' The mapping argues this
        is harmless since pending=false prevents processing and the clock would be
        overwritten on next fire. However, this means is_signaled() could return
        true for an aborted signal if the engine hasn't cycled since the signal's
        clock was set. In practice, abort prevents the signal from being processed
        (so engines won't wake up from it), and the clock is only set during
        process_pending_signals which won't run for an aborted signal. The old
        clock value from a previous fire could still be visible via is_signaled
        if an engine checks after abort but within the same clock epoch. This is
        a minor semantic difference.
      severity: COSMETIC

  constants: []

