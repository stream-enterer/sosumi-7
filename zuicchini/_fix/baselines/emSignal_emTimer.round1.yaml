- method: emTimer::emTimer (create_timer)
  branches:
    - branch: "scheduler.TimerStuff != NULL (existing TimerCentral)"
      rust_handles: YES
      evidence: >
        TimerCentral is a direct field on EngineCtxInner (engine.rs:67), always
        exists. No ref-counting needed — lifetime tied to scheduler.
      severity: CORRECT
    - branch: "scheduler.TimerStuff == NULL (no existing TimerCentral)"
      rust_handles: YES
      evidence: >
        TimerCentral::new() is called once in EngineScheduler::new() (core.rs:34).
        First-timer-creates-singleton semantics are replaced by always-present field.
      severity: CORRECT
  edge_cases:
    - edge_case: "First timer on a scheduler creates the shared TimerCentral singleton"
      rust_handles: YES
      evidence: "TimerCentral is always present; no lazy init needed"
  state_mutations:
    - mutation: "Node.Prev and Node.Next set to NULL (timer starts inactive)"
      rust_handles: YES
      evidence: >
        timer.rs:45: active: true is set at creation. However, the C++ timer starts
        inactive (just constructed, not started). In Rust, create_timer both creates
        AND starts the timer in one step, so active=true is correct for its semantics.
      severity: CORRECT

- method: emTimer::~emTimer (remove_timer)
  branches:
    - branch: "Node.Prev != NULL (timer is active/linked) — unlink"
      rust_handles: YES
      evidence: "timer.rs:58: self.timers.remove(id) removes entry from SlotMap regardless of active state"
      severity: CORRECT
    - branch: "Central->RefCount <= 0 (last timer destroyed) — delete Central"
      rust_handles: YES
      evidence: >
        No ref-counting in Rust. TimerCentral is owned by the scheduler and lives
        for the scheduler's lifetime. This branch is structurally unnecessary.
      severity: CORRECT
  edge_cases:
    - edge_case: "If this is the last timer, the shared TimerCentral is deleted"
      rust_handles: YES
      evidence: "TimerCentral persists as a scheduler field; empty SlotMap is negligible cost"
    - edge_case: "Timer may be inactive (Node.Prev == NULL) at destruction time"
      rust_handles: YES
      evidence: "SlotMap::remove works regardless of active flag"

- method: emTimer::Start
  branches:
    - branch: "!periodic — Period set to 0 (one-shot)"
      rust_handles: YES
      evidence: "timer.rs:43: periodic: bool is stored directly; periodic=false means one-shot"
      severity: CORRECT
    - branch: "periodic && !millisecs — Period clamped to 1"
      rust_handles: NO
      evidence: >
        timer.rs:42-44: interval_ms is stored as-is. A periodic timer with
        interval_ms=0 will fire every check_and_collect call without the 1ms
        minimum clamp. The C++ code explicitly clamped Period=1 to prevent
        zero-period periodic timers.
      severity: BEHAVIORAL
    - branch: "periodic && millisecs != 0 — Period set to millisecs"
      rust_handles: YES
      evidence: "timer.rs:42: interval_ms stored directly"
      severity: CORRECT
    - branch: "Node.Prev != NULL (already active) — unlink before re-insert"
      rust_handles: NO
      evidence: >
        Rust create_timer always creates a NEW timer entry (SlotMap::insert).
        There is no restart-in-place. To restart, caller must cancel_timer + create_timer,
        which returns a new TimerId. The mapping acknowledges this difference.
        This means the API requires callers to manage the old timer ID explicitly.
      severity: BEHAVIORAL
  constants:
    - constant: "minimum periodic period"
      spec_value: 1
      rust_value: MISSING
      match: NO
  edge_cases:
    - edge_case: "Restarting an already-running timer unlinks and re-inserts it"
      rust_handles: NO
      evidence: >
        No in-place restart API. Caller must cancel + create_timer, getting a new ID.
    - edge_case: "A periodic timer with millisecs=0 gets Period=1 to avoid infinite firing"
      rust_handles: NO
      evidence: >
        interval_ms=0 is stored as-is. The timer will fire every check_and_collect
        with Duration::from_millis(0) added each time, effectively firing every
        time slice without the 1ms floor.

- method: emTimer::Stop (cancel_timer)
