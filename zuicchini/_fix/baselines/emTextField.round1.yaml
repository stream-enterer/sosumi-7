# =============================================================================
# Selection / Deletion
# =============================================================================

- method: emTextField::DeleteSelectedText
  rust_fn: TextField::delete_selection
  status: MAPPED
  verdict: CORRECT
  notes: >
    C++ delegates to ModifySelectedText (validation + undo). Rust directly
    drains selection range, calls save_undo before drain, resets anchor. No
    validation hook but that is a documented omission. Core behavior matches.

# =============================================================================
# Undo / Redo
# =============================================================================

- method: emTextField::Undo
  rust_fn: TextField::undo
  status: MAPPED
  verdict: CORRECT
  notes: >
    Both pop from undo stack, push current state to redo, restore text and
    cursor, clear selection, fire change. C++ additionally selects the restored
    text (MF_SELECT flag) and signals CanUndoRedoSignal; Rust clears selection
    and returns bool. Acceptable simplification.

- method: emTextField::Redo
  rust_fn: TextField::redo
  status: MAPPED
  verdict: CORRECT
  notes: Same structure as Undo in reverse. Same acceptable simplifications.

- method: emTextField::CreateUndo
  rust_fn: TextField::save_undo
  status: MAPPED
  verdict: ACCEPTABLE
  items:
    - constant: MAX_UNDOS
      expected: 200
      actual: "MAX_UNDO = 100"
      severity: low
      notes: Different cap. Rust uses half the C++ limit.
    - branch: "Merge logic (UM_BACKSPACE, UM_DELETE, etc.)"
      expected: Merges adjacent same-type undo entries to reduce count.
      actual: No merge; each mutation creates a full-state snapshot.
      severity: low
      notes: >
        Documented simplification. Results in more undo entries and higher
        memory use, but functionally correct.
    - branch: "Size limit (MAX_UNDO_SIZE=10MB, MIN_UNDOS=3)"
      expected: Trims by size when total exceeds 10MB, keeping at least 3.
      actual: No size-based trimming. Only count-based cap at 100.
      severity: low
      notes: Full-state snapshots with no size limit could use significant memory for large texts.

- method: emTextField::CreateRedo
  rust_fn: "(inline in undo/redo methods)"
  status: RESTRUCTURED
  verdict: CORRECT
  notes: Redo entries are created inline by pushing current state in undo()/redo().

