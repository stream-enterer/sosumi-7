summary:
  total_mapped: 14
  total_restructured: 9
  correct: 18
  acceptable: 2
  minor_issue: 1
  bugs_found: 2
  bugs:
    - id: TF-BUG-001
      method: TextField::input (character input with selection)
      description: >
        Double undo entry on type-over selection. save_undo() called at line 231
        before delete_selection() at line 232, but delete_selection() also calls
        save_undo() at line 282 when selection is non-empty. Creates two undo
        snapshots for one logical operation.
      severity: medium
      fix: >
        Either (a) remove save_undo() from line 231 and let delete_selection
        handle it, then the character insert won't have its own undo entry --
        or better (b) have delete_selection skip save_undo when called from
        character input by extracting the drain logic, or (c) split
        delete_selection into a version that does not save undo and call that
        from the character-input path before the outer save_undo.
      rust_file: zuicchini/src/widget/text_field.rs
      rust_lines: 229-244

    - id: TF-BUG-002
      method: TextField::paint (selected text color)
      description: >
        Selected text is painted with input_fg_color (same as unselected text).
        C++ swaps to bgColor for selected text foreground. If input_hl_color is
        similar to input_fg_color, selected text becomes unreadable.
      severity: medium
      fix: >
        Paint text in two passes (unselected and selected segments) or use
        input_bg_color as the foreground color for the selected text range.
      rust_file: zuicchini/src/widget/text_field.rs
      rust_lines: 145-151

  minor_issues:
    - id: TF-MINOR-001
      method: TextField::set_text
      description: >
        Does not clear undo/redo stacks on set_text, unlike C++. User can undo
        past a programmatic text replacement.
      severity: medium
      rust_file: zuicchini/src/widget/text_field.rs
      rust_lines: 60-64
