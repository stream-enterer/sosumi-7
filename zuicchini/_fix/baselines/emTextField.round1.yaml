# =============================================================================

- method: emTextField::~emTextField
  rust_fn: Drop (implicit)
  status: RESTRUCTURED
  verdict: CORRECT
  notes: >
    Rust Vec<UndoEntry> fields are automatically dropped. Equivalent behavior.

