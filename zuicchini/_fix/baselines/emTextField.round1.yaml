# =============================================================================
# Input Handling
# =============================================================================

- method: emTextField::Input
  rust_fn: TextField::input
  status: MAPPED
  verdict: ISSUE
  items:
    - branch: "ArrowLeft (basic)"
      expected: Moves cursor one character left, clears selection (no shift).
      actual: Moves cursor left via prev_char_boundary, clears selection.
      status: CORRECT

    - branch: "ArrowRight (basic)"
      expected: Moves cursor one character right, clears selection (no shift).
      actual: Moves cursor right via next_char_boundary, clears selection.
      status: CORRECT

    - branch: "Home (no ctrl)"
      expected: Moves cursor to row start.
      actual: "Moves cursor to 0. Single-line only, so row start == 0."
      status: CORRECT

    - branch: "End (no ctrl)"
      expected: Moves cursor to row end.
      actual: "Moves cursor to text.len(). Single-line only, so row end == text.len()."
      status: CORRECT

    - branch: "Backspace (no selection)"
      expected: Deletes previous character with UM_BACKSPACE merge undo.
      actual: Calls save_undo (no merge), deletes prev char, fires change.
      status: CORRECT
      notes: No merge is an acceptable simplification.

    - branch: "Backspace (with selection)"
      expected: Deletes selected text.
      actual: Calls delete_selection which saves undo and drains.
      status: CORRECT

    - branch: "Delete (no selection)"
      expected: Deletes next character with UM_DELETE merge undo.
      actual: Calls save_undo (no merge), deletes next char, fires change.
      status: CORRECT

    - branch: "Delete (with selection)"
      expected: Deletes selected text.
      actual: Calls delete_selection which saves undo and drains.
      status: CORRECT

    - branch: "Ctrl+Z (undo)"
      expected: Performs undo.
      actual: "Detects via Key('z') with empty chars. Calls self.undo()."
      status: CORRECT

    - branch: "Ctrl+Y (redo)"
      expected: Performs redo.
      actual: "Detects via Key('y') with empty chars. Calls self.redo()."
      status: CORRECT
      notes: >
        C++ also supports Shift+Ctrl+Z for redo. Rust only supports Ctrl+Y.

    - branch: "Character input with active selection (type-over)"
      expected: >
        Replaces selection with typed character as a single undoable operation.
      actual: >
        save_undo() is called at line 231 BEFORE delete_selection() at line 232.
        delete_selection() internally calls save_undo() again (line 282) when
        selection is non-empty. This creates TWO undo entries for what should be
        one atomic operation. User must press undo twice to revert a type-over.
      status: BUG
      severity: medium
      rust_lines: 229-244

    - branch: "Character input (printable, no selection)"
      expected: >
        Inserts character at cursor with undo merge by character class
        (UM_ALPHA_NUM / UM_NON_ALPHA_NUM).
      actual: >
        Inserts character, advances cursor. Filters control chars. Enforces
        max_length. No undo merge.
      status: CORRECT
      notes: No merge is acceptable simplification.

    - branch: "Character code 127 (DEL) filtering"
      expected: "Character code 127 is explicitly filtered (char[0]!=127)."
      actual: >
        ch.is_control() filters control characters. In Rust, char 127 (DEL) IS
        a control character per Unicode, so it is correctly filtered.
      status: CORRECT

# =============================================================================
# Painting
# =============================================================================

- method: emTextField::PaintContent / DoTextField
  rust_fn: TextField::paint
  status: MAPPED / RESTRUCTURED
  verdict: ISSUE
  items:
    - branch: "Selection highlight color"
      expected: "Selection rectangle uses hlColor (InputHlColor for editable)."
      actual: "Selection rectangle uses self.look.input_hl_color."
      status: CORRECT

    - branch: "Selected text foreground color"
      expected: >
        C++ uses bgColor as foreground for selected text (fg/bg swap so
        selected text is readable against the highlight).
      actual: >
        Rust paints ALL text with input_fg_color regardless of selection state.
        Selected text foreground is NOT swapped to bgColor.
      status: BUG
      severity: medium
      rust_lines: 145-151
      notes: >
        Selected text may be unreadable if input_fg_color and input_hl_color
        have low contrast.

    - branch: "Cursor always visible (no blink)"
      expected: "Cursor blinks (500ms on, 500ms off) when focused."
      actual: "Cursor is always painted as solid 1px line. No blink state."
      status: ACCEPTABLE
      notes: Documented omission (no Cycle, no blink timer).

    - branch: "Cursor color"
      expected: >
        Full fgColor when editable+blink-on; 88% transparent when blink-off;
        75% transparent when not editable.
      actual: Always input_fg_color at full opacity.
      status: ACCEPTABLE
      notes: No blink or editable state means single color path.

    - branch: "Cursor shape (overwrite mode)"
      expected: "Box cursor in overwrite mode, I-beam in insert mode."
      actual: "Always 1px wide rect (line cursor). No overwrite mode."
      status: ACCEPTABLE
      notes: Documented omission (no overwrite mode).

    - branch: "Disabled look (80% blend toward BgColor)"
      expected: All colors blended 80% toward BgColor when disabled.
      actual: No disabled state handling.
      status: ACCEPTABLE
      notes: No IsEnabled concept in Rust widget.

    - branch: "Unfocused selection color (40% blend)"
      expected: "Selection uses blended fgColor at 40% when not in focused path."
      actual: "Always uses input_hl_color regardless of focus state."
      status: ACCEPTABLE
      notes: No focus-path concept in Rust widget.

    - branch: "Password mode paint"
      expected: "Paints asterisks individually per character position."
      actual: >
        Creates a single string of asterisks via "*".repeat(chars().count())
        and paints as one text run.
      status: CORRECT
      notes: Visual result is equivalent for monospace; may differ for proportional fonts.

    - branch: "Scroll computation"
      expected: >
        C++ ScrollToCursor uses view scrolling with 0.5 char horizontal
        padding and 0.2/1.2 row vertical padding.
      actual: >
        Rust scroll_x updated in paint: if cursor beyond visible_w, scroll
        right; if cursor before scroll_x, scroll left; clamp to 0. No padding.
      status: CORRECT
      notes: Different mechanism but achieves cursor visibility. No padding is a minor UX difference.

# =============================================================================
# Navigation Utilities
# =============================================================================

- method: emTextField::GetNextIndex
  rust_fn: TextField::next_char_boundary
  status: MAPPED
  verdict: CORRECT
  notes: >
    C++ uses emDecodeChar with mbState, handles CR+LF in multi-line. Rust
    increments and scans forward to next is_char_boundary(). Equivalent for
    single-line UTF-8. No CR+LF handling needed (single-line only).

- method: emTextField::GetPrevIndex
  rust_fn: TextField::prev_char_boundary
  status: MAPPED
  verdict: CORRECT
  notes: >
    C++ scans from start (O(n)). Rust scans backward from pos (O(1) amortized,
    max 4 bytes for UTF-8). Functionally equivalent. Callers guard pos > 0 to
    avoid usize underflow.

- method: emTextField::GetNormalizedIndex
  rust_fn: prev_char_boundary / next_char_boundary
  status: RESTRUCTURED
  verdict: CORRECT
  notes: >
    C++ scans from start to snap to valid boundary. Rust char boundary helpers
    achieve the same result more efficiently.

- method: emTextField::GetMBStateAtIndex
  rust_fn: "(not needed)"
  status: RESTRUCTURED
  verdict: CORRECT
  notes: Rust strings are always valid UTF-8; no decoder state tracking needed.

- method: emTextField::ModifySelectedText
  rust_fn: "(inline in input/delete_selection)"
  status: RESTRUCTURED
  verdict: CORRECT
  notes: Selection replacement handled inline. No centralized dispatch needed.

- method: emTextField::ModifyText
  rust_fn: "(inline operations)"
  status: RESTRUCTURED
  verdict: CORRECT
  notes: >
    Clamping is implicit via Rust bounds. Undo/change notification called
    inline at each mutation site.

- method: emTextField::ScrollToCursor
  rust_fn: "(scroll_x logic in paint)"
  status: RESTRUCTURED
  verdict: CORRECT
  notes: >
    Different mechanism (internal scroll_x vs EM view scrolling) but achieves
    cursor visibility for single-line horizontal scrolling.

