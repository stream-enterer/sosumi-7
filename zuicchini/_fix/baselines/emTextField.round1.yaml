# =============================================================================
# Constructor
# =============================================================================

- method: emTextField::emTextField
  rust_fn: TextField::new
  status: MAPPED
  verdict: ACCEPTABLE
  notes: >
    C++ cursor starts at text.len() (end of text arg); Rust cursor starts at 0
    but text starts empty so equivalent. No clipboard lookup (no fatal error
    path). No editable toggle on border type (always InputField). No
    MagicCursorColumn or SelectionId equivalents. All documented in mapping.

