# =============================================================================
# Text / Cursor
# =============================================================================

- method: emTextField::SetText
  rust_fn: TextField::set_text
  status: MAPPED
  verdict: MINOR_ISSUE
  items:
    - branch: "Text==text (early return)"
      expected: Returns immediately if text is identical.
      actual: No early-return guard. Always replaces.
      severity: low
      notes: Documented in mapping. Performance-only difference.
    - branch: "Clears undo/redo"
      expected: Clears all undo and redo entries.
      actual: Does not clear undo_stack or redo_stack.
      severity: medium
      notes: >
        After set_text(), undo can restore a state from before the programmatic
        set, which may be surprising. Not documented as intentional.

