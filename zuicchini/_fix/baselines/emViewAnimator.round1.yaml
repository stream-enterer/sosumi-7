    status: MAPPED
    verdict: DEFICIENT
    evidence:
      - "C++ initialises full state machine (ST_NO_GOAL, Animated=false, Acceleration=5.0, MaxCuspSpeed=2.0, MaxAbsoluteSpeed=5.0, etc.). Rust takes (target_x, target_y, target_a, speed) and sets active=true. No state machine."
    constants:
      - { name: "default Acceleration", spec: 5.0, rust: "not applicable (different model)", match: NO }
      - { name: "default MaxCuspSpeed", spec: 2.0, rust: "not implemented", match: NO }
      - { name: "default MaxAbsoluteSpeed", spec: 5.0, rust: "not implemented", match: NO }

  - method: "emVisitingViewAnimator::ClearGoal -> VisitingViewAnimator::stop"
    status: MAPPED
    verdict: CORRECT
    note: >
      stop() sets active=false. C++ ClearGoal also clears identity, names,
      seek state, etc. Rust has none of those fields, so stop() is equivalent.

  - method: "emVisitingViewAnimator::Deactivate -> VisitingViewAnimator::stop"
    status: MAPPED
    verdict: CORRECT

  - method: "emVisitingViewAnimator::CycleAnimation -> VisitingViewAnimator::animate"
    status: MAPPED
    verdict: DEFICIENT
    evidence:
      - "C++ is a 7-state machine (NO_GOAL, GIVEN_UP, GOAL_REACHED, GIVING_UP, CURVE, DIRECT, SEEK) with panel-tree-aware pathfinding, curved optimal paths, blocked-motion escalation, and seek retry. Rust is a simple lerp."
      - "Rust lerp convergence t = (speed * dt).min(1.0). C++ uses acceleration/deceleration profile (UpdateSpeed) with cusp speed and deceleration-to-stop."
      - "C++ uses RawScrollAndZoom with done-distance feedback and 0.2 blocking threshold. Rust calls scroll() + zoom() without feedback."
      - "Rust zoom factor = new_a / state.rel_a with div-by-zero guard. C++ uses log-space zoom."
    constants:
      - { name: "curve arrival threshold", spec: 1E-6, rust: "not applicable", match: NO }
      - { name: "blocked motion threshold", spec: 0.2, rust: "not implemented", match: NO }
      - { name: "give-up hope threshold", spec: 10, rust: "not implemented", match: NO }
      - { name: "give-up display time", spec: 1500, rust: "not implemented", match: NO }
    bugs:
      - severity: MINOR
        description: >
          Convergence check (lines 194-198) tests the OLD visit state (before
          scroll/zoom) against target. This means the animator always runs one
          extra frame after convergence. Should check the NEW state, or at least
          compare the deltas applied.
      - severity: MINOR
        description: >
          view.zoom(zoom_factor, 0.0, 0.0) zooms around viewport origin (0,0).
          The center_x/center_y parameters are ignored by View::zoom() (confirmed:
          view.rs line 146 uses _center_x, _center_y). This means zoom always
          scales rel_a without compensating scroll, which can cause drift when
          target position is away from origin.

