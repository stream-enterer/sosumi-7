# Verdict: emViewAnimator behavioral verification (Tier 1)
# Generated: 2026-03-05
# Spec: _verify/extracts/emViewAnimator.yaml
# Mapping: _verify/mappings/view.yaml (emViewAnimator section)
# Rust: zuicchini/src/panel/animator.rs

###############################################################################
# Summary
###############################################################################
#
# The Rust animator.rs is a dramatically simplified reimplementation.
# The C++ emViewAnimator hierarchy has ~2100 lines with 5 concrete classes,
# a master/slave activation chain, 3D velocity (scroll-x, scroll-y, zoom),
# zoom-fix-point compensation, friction toggle, blocked-motion feedback,
# a 7-state visiting state machine with seeking, and a precomputed optimal
# curve table.
#
# The Rust replacement is 227 lines with 3 concrete structs behind a trait,
# 2D velocity only, simple exponential friction, simple lerp visiting, and
# no seeking/state machine.
#
# This is a skeletal scaffold, not a faithful port. Many MAPPED methods have
# significant behavioral gaps even for the subset that is implemented.

###############################################################################
# Base emViewAnimator -> ViewAnimator trait
###############################################################################

methods:

  # --- RESTRUCTURED (no code to verify) ---
  # emViewAnimator::emViewAnimator        RESTRUCTURED  (no base class state)
  # emViewAnimator::~emViewAnimator       RESTRUCTURED  (no Drop)
  # emViewAnimator::SetMaster             RESTRUCTURED  (no master/slave chain)
  # emViewAnimator::Activate              RESTRUCTURED  (no activation chain)
  # emViewAnimator::SetDeactivateWhenIdle RESTRUCTURED  (caller decides)
  # emViewAnimator::Input                 RESTRUCTURED  (no input routing)
  # emViewAnimator::Paint                 RESTRUCTURED  (no paint routing)

  - method: "emViewAnimator::Deactivate -> ViewAnimator::stop"
    status: MAPPED
    verdict: CORRECT
    note: >
      Trait method stop(&mut self) sets active=false. No slave chain to
      deactivate, which is consistent with the RESTRUCTURED master/slave design.

  - method: "emViewAnimator::IsActive -> ViewAnimator::is_active"
    status: MAPPED
    verdict: CORRECT
    note: Trait method returning bool. Semantically equivalent.

  - method: "emViewAnimator::Cycle + CycleAnimation -> ViewAnimator::animate"
    status: MAPPED
    verdict: CORRECT
    note: >
      C++ Cycle computes dt from clock, clamps (0.33 max, 0.01 fallback),
      then calls CycleAnimation(dt). Rust animate() receives dt from caller,
      collapsing both into one method. Time management is external, which is
      a valid restructuring. The dt-clamp constants (0.33, 0.01) are NOT
      replicated in Rust -- caller is responsible.
    missing_constants:
      - { name: "dt clamp max", spec: 0.33, rust: "not applied (caller's job)" }
      - { name: "dt fallback", spec: 0.01, rust: "not applied (caller's job)" }

  ###########################################################################
  # emKineticViewAnimator -> KineticViewAnimator
  ###########################################################################

  # RESTRUCTURED (no code):
  # emKineticViewAnimator::Activate         (no chain traversal / dynamic_cast)
  # emKineticViewAnimator::GetAbsVelocity   (inlined)
  # emKineticViewAnimator::SetFrictionEnabled (always-on friction)
  # emKineticViewAnimator::SetFriction      (set at construction)
  # emKineticViewAnimator::UpdateBusyState  (inlined in animate)
  # MISSING:
  # emKineticViewAnimator::CenterZoomFixPoint
  # emKineticViewAnimator::SetZoomFixPoint
  # emKineticViewAnimator::UpdateZoomFixPoint

  - method: "emKineticViewAnimator::emKineticViewAnimator -> KineticViewAnimator::new"
    status: MAPPED
    verdict: DEFICIENT
    evidence:
      - "C++ velocity is 3D (scroll-x, scroll-y, zoom). Rust is 2D (velocity_x, velocity_y). Zoom axis missing."
      - "C++ default Friction=1000.0 (absolute deceleration rate). Rust friction clamped to [0.0,1.0] (decay coefficient). Entirely different units and physics model."
      - "C++ initialises ZoomFixPointCentered=true, ZoomFixX/Y=0. Rust has no zoom fix point."
      - "C++ FrictionEnabled=false initially. Rust friction is always enabled."
    constants:
      - { name: "default Friction", spec: 1000.0, rust: "friction.clamp(0.0, 1.0)", match: "NO -- different model" }
    note: >
      The 2D-only design is acceptable as a simplification, but the friction
      model is fundamentally different: C++ subtracts a*dt from speed (linear
      drag), Rust raises (1-f) to power dt*60 (exponential drag). This changes
      the feel of deceleration curves. The initial-velocity threshold 0.01
      matches.

  - method: "emKineticViewAnimator::Deactivate -> KineticViewAnimator::stop"
    status: MAPPED
    verdict: CORRECT
    note: Zeros velocity_x, velocity_y, sets active=false.

  - method: "emKineticViewAnimator::SetVelocity -> KineticViewAnimator::set_velocity"
    status: MAPPED
    verdict: CORRECT
    note: >
      C++ takes (dimension, value) per call. Rust takes (vx, vy) pair.
      Equivalent for 2D use. Missing: UpdateBusyState call (Rust sets active
      inline based on threshold).

  - method: "emKineticViewAnimator::CycleAnimation -> KineticViewAnimator::animate"
    status: MAPPED
    verdict: DEFICIENT
    evidence:
      - "C++ applies linear friction: v *= (v-a*dt)/v per dimension. Rust applies exponential decay: v *= (1-friction)^(dt*60). Different deceleration curves."
      - "C++ checks minimum motion threshold (0.01) before calling RawScrollAndZoom. Rust always calls view.scroll()."
      - "C++ zeros velocity per-dimension when blocked (done < 0.99*dist). Rust has no blocked-motion feedback."
      - "C++ handles zoom dimension (Velocity[2]). Rust has no zoom animation."
      - "C++ uses trapezoidal integration (friction applied before computing distance). Rust multiplies velocity*dt then applies decay. Different integration order."
    constants:
      - { name: "velocity threshold", spec: 0.01, rust: 0.01, match: YES }
      - { name: "minimum motion threshold", spec: 0.01, rust: "not checked", match: NO }
      - { name: "done ratio threshold", spec: 0.99, rust: "not implemented", match: NO }

  ###########################################################################
  # emSpeedingViewAnimator -> SpeedingViewAnimator
  ###########################################################################

  # RESTRUCTURED (no code):
  # emSpeedingViewAnimator::Activate           (implicit via set_target)
  # emSpeedingViewAnimator::GetAbsTargetVelocity (inlined)
  # emSpeedingViewAnimator::SetAcceleration    (set at construction)
  # emSpeedingViewAnimator::UpdateBusyState    (inlined in animate)
  # MISSING:
  # emSpeedingViewAnimator::SetReverseAcceleration

  - method: "emSpeedingViewAnimator::emSpeedingViewAnimator -> SpeedingViewAnimator::new"
    status: MAPPED
    verdict: DEFICIENT
    evidence:
      - "C++ has 3D target velocity. Rust has 2D."
      - "C++ defaults: Acceleration=1.0, ReverseAcceleration=1.0. Rust takes acceleration as param, no reverse acceleration."
    constants:
      - { name: "default Acceleration", spec: 1.0, rust: "caller-supplied", match: APPROXIMATE }
      - { name: "default ReverseAcceleration", spec: 1.0, rust: "not implemented", match: NO }

  - method: "emSpeedingViewAnimator::Deactivate -> SpeedingViewAnimator::stop"
    status: MAPPED
    verdict: CORRECT
    note: Zeros current and target velocity, sets active=false.

  - method: "emSpeedingViewAnimator::SetTargetVelocity -> SpeedingViewAnimator::set_target"
    status: MAPPED
    verdict: CORRECT
    note: >
      C++ per-dimension + UpdateBusyState. Rust takes (vx,vy) pair + sets
      active=true. Equivalent for 2D.

  - method: "emSpeedingViewAnimator::CycleAnimation -> SpeedingViewAnimator::animate"
    status: MAPPED
    verdict: DEFICIENT
    evidence:
      - "C++ per-dimension logic with 3 branches: reverse accel (v1*vt < -0.1), forward accel (|v1|<|vt|, dt clamped to 0.1), friction decel. Rust uses simple approach() helper with uniform step."
      - "C++ opposite-sign threshold: v1*vt < -0.1. Rust approach() has no direction-aware acceleration."
      - "C++ clamps dt to 0.1 for forward acceleration to prevent overshoot. Rust does not clamp."
      - "C++ temporarily disables base friction during speeding. Rust has no friction interaction (no base class friction)."
      - "C++ deactivation: target velocity magnitude > 0.01. Rust: target_vx==0 && target_vy==0 && current < 0.01. The Rust condition is stricter (requires exact zero target)."
    constants:
      - { name: "opposite sign threshold", spec: -0.1, rust: "not implemented", match: NO }
      - { name: "acceleration dt clamp", spec: 0.1, rust: "not implemented", match: NO }
      - { name: "target velocity threshold", spec: 0.01, rust: "exact 0.0 check", match: NO }
    bugs:
      - severity: MINOR
        description: >
          Rust idle check compares target_vx == 0.0 && target_vy == 0.0 using
          exact float equality (line 125-126). The C++ uses
          GetAbsTargetVelocity() > 0.01. The exact-zero check means release()
          works (sets to 0.0) but any epsilon-small target will keep the
          animator active forever.

