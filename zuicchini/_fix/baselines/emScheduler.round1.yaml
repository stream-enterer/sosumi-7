# emScheduler::~emScheduler  ->  RESTRUCTURED (no Rust equivalent)
# =========================================================================
- method: emScheduler::~emScheduler
  status: RESTRUCTURED
  notes: >
    Mapping says RESTRUCTURED. C++ destructor fatally asserts no remaining
    engines or signals. Rust drops the scheduler normally; SlotMap drops its
    contents. Ownership model prevents dangling references. No behavioral
    divergence because the invariant is structurally enforced.
  branches:
    - branch: "EngineCount != 0 => fatal error"
      rust_handles: NO
      evidence: "No Drop impl on EngineScheduler. Engines are value-typed in SlotMap and dropped automatically."
      severity: COSMETIC
    - branch: "PSList.Next != &PSList => fatal error"
      rust_handles: NO
      evidence: "No Drop impl. pending_signals Vec is dropped automatically."
      severity: COSMETIC
  constants: []
  edge_cases:
    - edge_case: "If any emEngine or emSignal is still alive when the scheduler is destroyed, the process aborts"
      rust_handles: NO
      evidence: "Rust ownership model makes this impossible — engines and signals are owned by the scheduler's SlotMaps, so they are always destroyed with it. No external dangling references possible."

# =========================================================================
# emScheduler::DoTimeSlice  ->  do_time_slice + process_pending_signals
# =========================================================================
- method: emScheduler::DoTimeSlice
  all_correct: false
  branches:
    # --- Pending-signal processing ---
    - branch: "(sr1=PSList.Next) != &PSList — pending signals exist"
      rust_handles: YES
      evidence: "core.rs line 358: `while !self.inner.pending_signals.is_empty()`"
      severity: CORRECT

    - branch: "(sr2=sr1->Next) != &PSList — more than one pending signal, perform reversal"
      rust_handles: PARTIAL
      evidence: "Rust uses Vec which preserves insertion order (FIFO). No reversal is performed. C++ reversal was needed because signals were prepended to a singly-linked list (LIFO). Vec push is append (FIFO), so processing in order is equivalent to C++ reverse-then-process. Net effect: signals dispatched in insertion order."
      severity: CORRECT

    - branch: "sr3 == &PSList (reversal loop break 1)"
      rust_handles: PARTIAL
      evidence: "No reversal loop exists in Rust. Vec iteration handles this implicitly."
      severity: CORRECT

    - branch: "sr1 == &PSList (reversal loop break 2)"
      rust_handles: PARTIAL
      evidence: "No reversal loop exists in Rust. Vec iteration handles this implicitly."
      severity: CORRECT

    - branch: "sr2 != &PSList (do-while exit of reversal)"
      rust_handles: PARTIAL
      evidence: "No reversal loop. Vec maintains insertion order natively."
      severity: CORRECT

    - branch: "el != NULL — signal has listeners, iterate and wake engines"
      rust_handles: YES
      evidence: "core.rs lines 365-369: iterates sig.connected_engines and calls wake_up_engine for each"
      severity: CORRECT

    - branch: "el != NULL — inner do-while on listener links"
      rust_handles: YES
      evidence: "core.rs line 367: `for eng_id in engines { self.inner.wake_up_engine(eng_id); }`"
      severity: CORRECT

    - branch: "PSList.Next != &PSList — outer do-while for dispatching signals (re-entrant signal firing)"
      rust_handles: YES
      evidence: "core.rs line 358: `while !self.inner.pending_signals.is_empty()` — uses std::mem::take on line 359, so if wake_up_engine causes new signals to be fired (via the engine wakeup path), the outer while loop re-checks. However, wake_up_engine does NOT fire signals — it only enqueues engines. New signals are only fired during engine cycle(). So this while loop handles the case where process_pending_signals is called and new signals appear."
      severity: CORRECT

    # --- Awake-engine list scanning ---
    - branch: "er != l — current awake list is non-empty, process engine"
      rust_handles: YES
      evidence: "core.rs lines 254-256: `if !queue.is_empty() { break; }`"
      severity: CORRECT

    - branch: "CurrentAwakeList < AwakeLists — all lists drained, flip TimeSlice"
      rust_handles: YES
      evidence: "core.rs lines 258-269: `if current_priority_idx < 2 + parity` then flips time_slice and returns"
      severity: CORRECT

    - branch: "!e->Cycle() — engine returns false, update clock, continue"
      rust_handles: YES
      evidence: "core.rs lines 307,309: `eng.clock = self.inner.clock;` then checks `if stay_awake && eng.awake_state < 0` — when stay_awake is false, clock is updated and no re-enqueue happens"
      severity: CORRECT

    - branch: "(e=CurrentEngine) == NULL after Cycle returned false — engine destroyed during cycle"
      rust_handles: YES
      evidence: "core.rs line 305: `if let Some(eng) = self.inner.engines.get_mut(engine_id)` — if engine was removed during cycle, this returns None, and the behavior Box (held locally) is dropped. No post-processing occurs."
      severity: CORRECT

    - branch: "(e=CurrentEngine) == NULL after Cycle returned true — engine destroyed during cycle"
      rust_handles: YES
      evidence: "Same as above — core.rs line 305: `if let Some(eng)` check covers both stay_awake=true and stay_awake=false paths"
      severity: CORRECT

    - branch: "e->AwakeState >= 0 — engine already re-awakened during Cycle, skip re-enqueue"
      rust_handles: YES
      evidence: "core.rs line 309: `if stay_awake && eng.awake_state < 0` — only re-enqueues if awake_state < 0, so if engine was re-woken during cycle (awake_state >= 0), it skips re-enqueue"
      severity: CORRECT

  constants:
    - constant: Priority-to-list index formula
      spec_value: "Priority*2 + timeSlice"
      rust_value: "(priority as usize) * 2 + (parity as usize)"
      match: YES
      evidence: "core.rs line 313: `let queue_idx = (eng.priority as usize) * 2 + (next_parity as usize);` and engine.rs line 137: `let queue_idx = (eng.priority as usize) * 2 + (current_parity as usize);`"

    - constant: High-priority list base offset
      spec_value: 8
      rust_value: 8
      match: YES
      evidence: "core.rs line 245: `(Priority::COUNT - 1) * 2 + parity` = (5-1)*2 + 0 = 8 (or 9 for odd parity)"

  edge_cases:
    - edge_case: "Engine destroys itself during Cycle — CurrentEngine set to NULL, loop skips post-processing"
      rust_handles: YES
      evidence: "core.rs lines 286-293: behavior is extracted via take() before cycle. Line 305: `if let Some(eng)` check handles missing engine after cycle."

    - edge_case: "Pending-signal list has exactly one signal — reversal skipped"
      rust_handles: YES
      evidence: "Rust uses Vec; no reversal needed at all. Single element processed directly via for loop on line 360."

    - edge_case: "Signal has no listeners — dequeued and clock updated, no engines woken"
      rust_handles: YES
      evidence: "core.rs lines 361-363: signal's pending is set to false and clock is updated. Line 365-366: if connected_engines is empty, the for loop body never executes."

    - edge_case: "Awake-list scan walks from highest priority down to lowest, decrementing by 2"
      rust_handles: YES
      evidence: "core.rs line 273: `current_priority_idx -= 2;`"

  behavioral_notes:
    - issue: "TimeSliceCounter diverges"
      detail: >
        C++ increments TimeSliceCounter once per DoTimeSlice call. Rust has no
        TimeSliceCounter field; time_slice_counter() on line 351 returns
        self.inner.clock, which increments multiple times per time slice (twice
        per engine dispatch plus once at the top). This is noted with a TODO in
        the code (line 349). The mapping lists this as unmapped Rust code, so
        it is not a spec violation per se, but callers relying on a monotonic
        once-per-slice counter would get different values.
      severity: BEHAVIORAL

    - issue: "Clock incremented twice per engine instead of once per outer loop iteration"
      detail: >
        C++ increments Clock once at the top of the outer for(;;) loop (before
        signal processing AND engine dispatch). Rust increments clock at line
        249 (top of loop) AND again at line 322 (after engine cycle, before
        re-ascent signal processing). This means each engine dispatch consumes
        two clock ticks instead of one. The practical effect: is_signaled
        comparisons still work correctly because signal.clock is set to the
        current clock value when processed, and engine.clock is set after cycle.
        But the absolute clock values diverge from C++.
      severity: BEHAVIORAL

    - issue: "Remaining engines moved to next parity on exit"
      detail: >
        C++ simply flips TimeSlice when all lists are drained. Rust on lines
        261-266 drains the current-parity queues and extends the next-parity
        queues. In C++ this is unnecessary because the intrusive linked list
        nodes carry their parity implicitly and engines are scanned by parity.
        In Rust, since engines can be in current-parity queues after being
        re-woken during this slice but at a priority below the scan point,
        they would be stranded. The drain-and-move is correct for the Vec
        representation, but functionally it moves engines that were woken
        during the current slice into the next slice's queues, which matches
        the C++ behavior where such engines would naturally appear in the next
        time slice's scan. This is CORRECT adaptation.
      severity: CORRECT

