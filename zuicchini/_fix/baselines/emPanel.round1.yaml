- method: "emPanel::DeleteAllChildren -> PanelTree::delete_all_children"
  status: MAPPED
  verdict: pass
  notes: >
    Collects children and removes each. C++ deletes last-to-first;
    Rust iterates first-to-last. Order difference is harmless since each
    remove properly unlinks. Sibling pointers are correctly maintained
    because each remove() re-patches prev/next links.

- method: "emPanel::Paint -> PanelBehavior::paint"
  status: MAPPED
  verdict: pass
  notes: >
    Both default to no-op. Rust receives (w, h) explicitly instead of
    reading from panel state. Acceptable restructure.

- method: "emPanel::GetCursor -> PanelBehavior::get_cursor"
  status: MAPPED
  verdict: pass
  detail: >
    C++ default delegates to parent, root returns NORMAL. Rust always returns
    Cursor::Normal. This means child panels won't inherit parent cursor by
    default in Rust. Minor behavioral difference but acceptable since cursor
    inheritance can be added at the View level if needed.

- method: "emPanel::IsOpaque -> PanelBehavior::is_opaque"
  status: MAPPED
  verdict: pass
  notes: Default returns false in both. Correct.

- method: "emPanel::LayoutChildren -> PanelBehavior::layout_children"
  status: MAPPED
  verdict: pass
  notes: Default no-op in both. Rust version receives PanelCtx. Correct.

- method: "emPanel::Notice -> PanelBehavior::notice"
  status: MAPPED
  verdict: pass
  notes: Default no-op in both. Correct.

- method: "emPanel::Cycle -> PanelBehavior::cycle"
  status: MAPPED
  verdict: flag
  detail: >
    C++ returns bool (true = keep cycling/awake). Rust returns () (void).
    This means the wake/sleep optimization is lost -- panels cannot signal
    they want to stop receiving cycle calls. Not a correctness bug but
    a performance concern for idle panels.

# ==========================================================================
# RESTRUCTURED methods
