- method: "emPanel::emPanel -> PanelTree::create_root / create_child"
  status: RESTRUCTURED
  verdict: flag
  items:
    - check: "Child sibling linking"
      result: pass
      detail: >
        create_child correctly links prev/next siblings and sets
        parent.first_child / parent.last_child. Matches C++ Prev/Next
        linking logic.
    - check: "CHILDREN_CHANGED notification on parent"
      result: pass
      detail: >
        create_child inserts CHILDREN_CHANGED into parent pending_notices.
        Matches C++ NF_CHILD_LIST_CHANGED.
    - check: "Name index insertion"
      result: pass
      detail: >
        HashMap insert replaces AVL tree insert. Semantically equivalent.
    - check: "Child enabled inheritance"
      result: fail
      detail: >
        C++ sets child Enabled = parent->Enabled (inherits computed enabled
        state from parent). Rust create_child initializes enabled=true
        unconditionally (PanelData::new sets enabled: true). If parent is
        disabled, newly created child will incorrectly appear enabled until
        the next recompute_enabled call. No recompute_enabled is called
        during create_child.
    - check: "Root panel initial layout"
      result: info
      detail: >
        C++ sets LayoutX=0, LayoutY=0, LayoutWidth=1.0,
        LayoutHeight=View.GetHomeTallness(). Rust create_root sets
        layout_rect=(0,0,0,0). Width/height are zero, so root starts
        with degenerate geometry. This is documented in the mapping notes
        as deferred to View struct setup.
    - check: "Root panel duplicate guard"
      result: fail
      detail: >
        C++ emFatalError if RootPanel already exists. Rust create_root
        silently overwrites self.root with the new panel ID, orphaning the
        previous root without removing it from the arena. No panic or error.
    - check: "Off-screen initial position (LayoutX=-2)"
      result: info
      detail: >
        C++ initializes child at LayoutX=-2 LayoutY=-2 (off-screen).
        Rust initializes at (0,0,0,0). Documented divergence. Zero-size
        rect achieves similar effect (invisible) but at origin rather
        than off-screen.

- method: "emPanel::~emPanel -> PanelTree::remove"
  status: RESTRUCTURED
  verdict: pass
  items:
    - check: "Sibling unlinking"
      result: pass
      detail: >
        Correctly handles all four cases: prev exists / prev is None,
        next exists / next is None. Parent first_child and last_child
