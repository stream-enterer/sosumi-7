- method: "emPanel::Layout -> PanelTree::set_layout_rect"
  status: RESTRUCTURED
  verdict: flag
  items:
    - check: "LayoutWidth/Height minimum clamp"
      result: fail
      detail: >
        C++ clamps LayoutWidth and LayoutHeight to 1E-100 minimum to
        prevent division by zero. Rust set_layout_rect stores the values
        as-is with no clamping. Zero or negative width/height could cause
        division by zero when computing tallness (height/width).
    - check: "Canvas color separate from geometry"
      result: pass
      detail: >
        set_canvas_color is a separate method with CANVAS_CHANGED notice.
        Acceptable restructure.
    - check: "LAYOUT_CHANGED notice"
      result: pass
      detail: Correctly set on geometry change.
    - check: "Root panel forced layout"
      result: info
      detail: >
        C++ forces root LayoutX=0, LayoutY=0, LayoutWidth=1.0. Rust has
        no such constraint in set_layout_rect. Caller must enforce this.
    - check: "Early return on no-change"
      result: fail
      detail: >
        C++ checks if geometry is unchanged and returns early (only
        checking canvas color). Rust always overwrites and always sets
        LAYOUT_CHANGED even if the rect is identical. This could cause
        unnecessary layout_children calls.

- method: "emPanel::GetLayoutX/Y/Width/Height -> PanelCtx::layout_rect"
  status: RESTRUCTURED
  verdict: pass
  notes: >
    Four individual accessors merged into single tuple return. Correct.

- method: "emPanel::IsViewed -> PanelCtx::is_visible"
  status: RESTRUCTURED
  verdict: flag
  detail: >
    Semantic mismatch documented in mapping. C++ IsViewed is computed from
    viewport intersection. Rust is_visible returns a user-set visibility
    flag. These are fundamentally different concepts. Code that depends on
    IsViewed for viewport-awareness will not work correctly with is_visible.

- method: "emPanel::SetEnableSwitch -> PanelTree::set_enable_switch + recompute_enabled"
  status: MAPPED
  verdict: pass
  items:
    - check: "Early return on no change"
      result: pass
      detail: Both C++ and Rust check if value unchanged and return early.
    - check: "Recursive propagation"
      result: pass
      detail: >
        C++ uses iterative DFS with pointer manipulation. Rust uses
        recursive recompute_enabled. Both AND enable_switch with parent
        enabled state. Both skip subtrees where enabled state doesn't
        actually change (Rust checks new_enabled != panel.enabled).
    - check: "ENABLE_CHANGED notification"
      result: pass
      detail: Both set NF_ENABLE_CHANGED / ENABLE_CHANGED only when state changes.
    - check: "Enable when parent disabled"
      result: pass
      detail: >
        C++ checks (!Parent || Parent->Enabled) before traversal. Rust
        computes parent_enabled from parent's enabled field (defaults to
        true for root). Since enable_switch && false == false, children
        won't change. Correct.

- method: "emPanel::SetFocusable -> PanelCtx::set_focusable"
  status: RESTRUCTURED
  verdict: flag
  items:
    - check: "Basic focusable flag set"
      result: pass
      detail: Sets PanelData.focusable. Correct.
    - check: "Active panel migration on unfocusing"
      result: fail
      detail: >
        C++ moves activation to parent when active panel becomes
        unfocusable. Rust simply sets the flag with no migration logic.
        An unfocusable active panel would remain active.
    - check: "Root unfocusable guard"
      result: fail
      detail: >
        C++ prevents root from becoming unfocusable (logs debug, returns).
        Rust has no such guard; root can be made unfocusable.

- method: "emPanel::Input -> PanelBehavior::input"
  status: RESTRUCTURED
  verdict: pass
  notes: >
    C++ default handles focus-on-click and keyboard navigation. Rust
    default is no-op, returning false. Keyboard navigation moved to
    ViewInputFilter chain. Documented divergence. The trait signature
    returns bool for event consumption which is correct.

- method: "emPanel::AutoExpand -> PanelBehavior::auto_expand"
  status: RESTRUCTURED
  verdict: flag
  detail: >
    C++ is void (performs expansion side-effects directly). Rust returns
    bool (declarative). The expansion triggering mechanism is not yet wired
    up, so the return value is currently unused.

- method: "emPanel::AutoShrink -> PanelBehavior::auto_shrink"
  status: RESTRUCTURED
  verdict: flag
  detail: >
    C++ deletes all CreatedByAE children (concrete side-effect). Rust returns
    bool (declarative). CreatedByAE tracking is not implemented, so selective
    deletion of AE-created children is not possible. All-or-nothing via
    delete_all_children would be the alternative.

- method: "emPanel::AddPendingNotice -> direct field mutation"
  status: RESTRUCTURED
  verdict: pass
  notes: >
    C++ ORs flags into PendingNoticeFlags and adds to view notice list.
    Rust mutates pending_notices directly. deliver_notices iterates all
    panels (no explicit notice list), which is O(n) vs C++ O(pending).
    Correct but less efficient.

- method: "emPanel::HandleNotice -> PanelTree::deliver_notices"
  status: RESTRUCTURED
  verdict: flag
  items:
    - check: "Notice flag clearing and delivery"
      result: pass
      detail: >
        Clears pending flags, calls behavior.notice(flags). Correct.
    - check: "LAYOUT_CHANGED triggers layout_children"
      result: pass
      detail: >
        If flags contains LAYOUT_CHANGED, calls behavior.layout_children(ctx).
        Correct.
    - check: "AE decision logic"
      result: fail
      detail: >
        C++ HandleNotice handles AEInvalid, AEDecisionInvalid, and the
        full expand/shrink decision cycle. Rust deliver_notices has none
        of this. Auto-expansion is completely absent from the notice
        delivery path.
    - check: "Iteration order"
      result: info
      detail: >
        Rust iterates all panels via SlotMap::keys() which has arbitrary
        order. C++ processes via a linked notice list. Delivery order may
        differ; parent notices could fire after child notices in Rust,
        potentially causing stale layout_children calls.

- method: "emPanel::InvalidateChildrenLayout -> NoticeFlags::LAYOUT_CHANGED"
  status: RESTRUCTURED
  verdict: pass
  notes: >
    LAYOUT_CHANGED set by set_layout_rect, and deliver_notices calls
    layout_children when LAYOUT_CHANGED is pending. Correct structural
    replacement.

