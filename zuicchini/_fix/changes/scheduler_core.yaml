module: zuicchini/src/scheduler/core.rs
changes:
  - fix_id: SCHED-001
    action: MODIFIED
    lines_before: 318-323
    lines_after: 318-319
    description: >
      Removed second clock increment (self.inner.clock += 1) after engine
      cycle. Clock now increments once per dispatch iteration at line 249,
      matching C++ emScheduler::DoTimeSlice semantics.
    extract_branches_addressed:
      - "Clock incremented once per outer loop iteration"

  - fix_id: SCHED-002
    action: MODIFIED
    lines_before: 342-352
    lines_after: 342-345
    description: >
      Added dedicated time_slice_counter field to EngineCtxInner (engine.rs).
      Initialized to 0 in new(). Incremented once at parity flip in
      do_time_slice(). time_slice_counter() now returns the dedicated field
      instead of self.inner.clock.
    extract_branches_addressed:
      - "TimeSliceCounter incremented once per DoTimeSlice call"
