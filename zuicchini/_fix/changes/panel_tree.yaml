module: zuicchini/src/panel/tree.rs
changes:
  - fix_id: PANEL-001
    action: MODIFIED
    lines_before: 111-116
    lines_after: 111-119
    description: >
      Added recompute_enabled(id) call after linking child into parent's
      child list. New child now inherits parent's enabled state instead of
      unconditionally starting as enabled=true.
    extract_branches_addressed:
      - "child Enabled = parent->Enabled"

  - fix_id: PANEL-002
    action: MODIFIED
    lines_before: 86-92
    lines_after: 86-96
    description: >
      Added assert!(self.root.is_none()) before creating root panel.
      Panics with descriptive message if root already exists, matching
      C++ emFatalError behavior.
    extract_branches_addressed:
      - "emFatalError if RootPanel already exists"

  - fix_id: PANEL-003
    action: MODIFIED
    lines_before: 240-245
    lines_after: 246-261
    description: >
      Width and height are now clamped to minimum 1e-100 before storing
      in layout_rect, preventing division-by-zero in tallness computations.
    extract_branches_addressed:
      - "clamp LayoutWidth and LayoutHeight to 1E-100 minimum"

  - fix_id: PANEL-004
    action: MODIFIED
    lines_before: 240-245
    lines_after: 246-261
    description: >
      Added equality check: if new rect == old rect, returns early without
      setting LAYOUT_CHANGED notice. Prevents unnecessary layout_children
      calls.
    extract_branches_addressed:
      - "check if geometry is unchanged and return early"

  - fix_id: PANEL-005
    action: RECLASSIFIED
    reason: >
      PanelCtx::set_focusable only has &mut PanelTree, not &mut View.
      Migrating the active panel when unfocusing requires View access.
      This is an architectural gap: PanelCtx needs to be extended with
      optional View context, or set_focusable needs to be split into
      separate tree-level and view-level operations. This is a design
      decision, not a simple fix.
