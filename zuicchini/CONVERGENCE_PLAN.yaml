  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 6: Widget API Completeness
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # Leaf-node features. Pure additive surface area — nothing breaks without
  # them, but certain interactions are impossible until they exist.
  #
  # Depends on: Phase 2 (view hooks needed by some widgets like TextField)

  - phase: 6
    name: "Widget API Completeness"
    depends_on: [2]
    items:

      - id: D-WIDGET-01
        summary: "SetLabelInBorder not ported"
        detail: >
          C++ toggles label inside/outside border. Rust always behaves as
          LabelInBorder=true.
        options:
          - "KEEP: no egopol widget uses LabelInBorder=false"
          - "PORT: add label_in_border field"
        resolution:
        status:
        needs_extract: false
        affected_files: [src/widget/border.rs]

      - id: D-WIDGET-02
        summary: "Label block alignment not implemented"
        detail: >
          C++ positions the entire label block (icon+caption+description) as
          a unit using LabelAlignment. Rust only aligns individual text lines.
        options:
          - "KEEP: per-line alignment may look better"
          - "PORT: block-level alignment"
        resolution:
        status:
        needs_extract: false
        affected_files: [src/widget/border.rs]

      - id: D-WIDGET-03
        summary: "No undo merge logic in TextField"
        detail: >
          C++ merges consecutive same-type edits into single undo entries
          (typing several characters = one undo). Rust creates separate
          entry per operation.
        options:
          - "KEEP: per-operation undo is simpler"
          - "PORT: merge consecutive inserts/deletes"
        resolution:
        status:
        needs_extract: false
        affected_files: [src/widget/text_field.rs]

      - id: D-WIDGET-04
        summary: "DM_INSERT/DM_MOVE drag behaviors simplified"
        detail: >
          DM_INSERT release doesn't paste from primary clipboard. DM_MOVE
          doesn't use drag offset (cursor jumps to drop position).
        options:
          - "KEEP: simplified drag is fine for game UI"
          - "PORT: full drag-and-drop behaviors"
        resolution:
        status:
        needs_extract: false
        affected_files: [src/widget/text_field.rs]

      - id: D-WIDGET-05
        summary: "ModifySelection anchor logic differs"
        detail: >
          C++ uses closest-endpoint anchor for selection modification. Rust
          uses a different anchor strategy. Affects Shift+click behavior.
        options:
          - "KEEP: if current behavior feels natural"
          - "PORT: match C++ closest-endpoint anchor"
        resolution:
        status:
        needs_extract: false
        affected_files: [src/widget/text_field.rs]

      - id: D-WIDGET-06
        summary: "emListBox: 21 missing item manipulation APIs"
        detail: >
          Missing add/insert/remove/move/sort and programmatic selection APIs.
          Rust uses simplified bulk-set model (set_items replaces all).
        options:
          - "KEEP: bulk-set model is simpler"
          - "PORT: incremental API for large dynamic lists"
        resolution:
        status:
        needs_extract: true
        affected_files: [src/widget/list_box.rs]

      - id: D-WIDGET-07
        summary: "emScalarField: 12 missing methods"
        detail: >
          Missing editable toggle, min/max getters/setters, scale mark config,
          text formatting hooks, keyboard interval.
        options:
          - "KEEP: minimal slider is sufficient"
          - "PORT: add range configuration and scale marks"
        resolution:
        status:
        needs_extract: true
        affected_files: [src/widget/scalar_field.rs]

      - id: D-WIDGET-08
        summary: "emRadioButton: 5 missing mechanism methods"
        detail: >
          Missing SetChecked on individual buttons, Mechanism::RemoveByIndex,
          RemoveAll, GetButton, combined layout groups.
        options:
          - "KEEP: current API covers basic use"
          - "PORT: add mechanism methods for dynamic radio groups"
        resolution:
        status:
        needs_extract: true
        affected_files: [src/widget/radio_button.rs]

      - id: D-BULK-MISSING
        summary: "220+ MISSING methods across all subsystems (bulk)"
        detail: >
          Most are low-priority accessors, C++ infrastructure (RTTI,
          serialization), or features unused by egopol. High-impact items
          are captured individually above. This catch-all covers the remainder.
        options:
          - "AUDIT: review each MISSING method against egopol usage"
          - "DEFER: implement on-demand as egopol features require them"
        resolution:
        status:
        needs_extract: true
        affected_files: ["(see _verify/mappings/*.yaml)"]
