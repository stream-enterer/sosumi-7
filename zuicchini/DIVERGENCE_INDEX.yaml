- id: DIV-007
  area: painter/compound
  kind: expected-divergence
  tests: [multi_compose]
  status: passing
  evidence:
    multi_compose: { ch_tol: 1, max_pct: 0.5, max_diff: 1, pct_differ_at_1: 0.01 }
  source: []
  analysis: tests/golden_parity/PARITY_STATUS.md section C7
  related: [DIV-001]
  notes: >
    Improved from ch_tol=80 to ch_tol=1 after DIV-002/003/004/006 fixes. Residual
    is 9 pixels at polygon AA boundaries where multiple non-opaque shapes overlap.
    This is a fundamental polygon approximation difference (C++ vs Rust N-segment
    ellipse) producing ±1 at boundary pixels where coverage stacking interacts
    with the polygon boundary position. Cannot be resolved without matching C++
    ellipse-equation-per-scanline approach (DIV-001).

