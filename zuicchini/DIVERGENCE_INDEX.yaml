# Divergence Index — zuicchini vs C++ emCore
#
# Every known divergence from C++ ground truth has exactly one entry here.
# This file is an index: it records observable facts and points to analysis,
# not editorial claims about root causes or fix strategies.
#
# Schema:
#   id:        Stable identifier (DIV-nnn for divergences, GAP-nnn for missing impl)
#   area:      Subsystem path (painter/image, widget/button, layout/linear, etc.)
#   kind:      expected-divergence | missing-implementation | out-of-scope | bug-fixed
#   tests:     List of test function names that demonstrate this
#   status:    passing | ignored | no-test | not-applicable
#   evidence:  Measured diff numbers from tests. Two conventions:
#              - Painter entries use PARITY_STATUS.md probed-at-failure values
#                (ch_tol/max_diff/pct_differ_at_1), which are higher than the
#                test's passing tolerance. These measure the divergence magnitude.
#              - Widget entries use approx_diff from test comments (the actual
#                measured diff at tol=0), plus the test's passing tolerance.
#   source:    Rust source file(s) where the divergent code lives (function names,
#              not line numbers, to resist staleness)
#   analysis:  Pointer to deeper analysis (file path + section name)
#   related:   Other DIV/GAP IDs that compound into this one
#   notes:     Brief factual note (not interpretation)

# ═══════════════════════════════════════════════════════════════════
# PAINTER — Architectural divergences (Category C from PARITY_STATUS)
