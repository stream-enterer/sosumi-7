- id: DIV-018
  area: widget/button
  kind: resolved
  tests: [widget_button_normal]
  status: passing
  evidence:
    widget_button_normal: { approx_diff: "~0.9% (ch_tol=3, max_pct=1.5%)" }
  source: [src/widget/border.rs]
  related: [DIV-025, DIV-019]
  notes: >
    Root cause was InstrumentMoreRound outer_insets using RoundRect-like formula
    (s*0.223*CORNER_INSET_FACTOR + s*0.02 = s*0.085) instead of C++ value (s*0.052).
    This made border ~64% thicker, shifting all 9-slice sections. Fixed outer_insets
    and substance_round_rect to use s*0.052. Combined with 24fp area sampling port,
    reduced from ~60% to ~0.9%. Residual: text rendering + bilinear edge effects.

