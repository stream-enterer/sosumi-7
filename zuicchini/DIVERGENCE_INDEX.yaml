  status: passing
  evidence:
    line_basic: { ch_tol: 80, max_pct: 1.0, max_diff: 152, pct_differ_at_1: 1.21 }
    line_dashed: { ch_tol: 80, max_pct: 2.0, max_diff: 255, pct_differ_at_1: 1.90 }
    outline_rect: { ch_tol: 80, max_pct: 4.5, max_diff: 255, pct_differ_at_1: 4.25 }
    outline_ellipse: { ch_tol: 80, max_pct: 2.5, max_diff: 255, pct_differ_at_1: 3.02 }
    outline_polygon: { ch_tol: 80, max_pct: 1.5, max_diff: 255, pct_differ_at_1: 2.46 }
    outline_round_rect: { ch_tol: 80, max_pct: 4.5, max_diff: 255, pct_differ_at_1: 4.21 }
    bezier_stroked: { ch_tol: 80, max_pct: 3.0, max_diff: 255, pct_differ_at_1: 3.48 }
    polyline: { ch_tol: 80, max_pct: 3.5, max_diff: 255, pct_differ_at_1: 4.24 }
  source: [src/render/painter.rs (paint_solid_polyline)]
  analysis: tests/golden_parity/PARITY_STATUS.md section C3
  notes: >
    Stroke outline polygon construction differs (offset-curve, corner, cap geometry).
    max_diff=255 in most tests means some edge pixels are fully present in one output
    and absent in the other — this is a structural boundary position difference, not
    rounding. The stroke polygon vertices land at different sub-pixel positions.

- id: DIV-004
  area: painter/curve-polygon
  kind: expected-divergence
  tests: [bezier_filled]
  status: passing
  evidence:
    bezier_filled: { ch_tol: 80, max_pct: 4.5, max_diff: 255, pct_differ_at_1: 4.41 }
  source: [src/render/painter.rs (tessellate_cubic)]
  analysis: tests/golden_parity/PARITY_STATUS.md section C4
  notes: >
    C++ evaluates bezier directly during scanline fill; Rust uses recursive subdivision
    to polygon. max_diff=255 means structural boundary position difference (curve
    flattening places vertices at different positions than direct evaluation).

- id: DIV-005
  area: painter/image-scaling
  kind: bug-fixed
  tests: [image_scaled]
  status: passing
  analysis: tests/golden_parity/PARITY_STATUS.md section C5
  notes: >
    Was: f64 coordinate mapping and weight extraction vs C++ 24-bit fixed-point
    integer arithmetic. Fixed by porting to ScaleTransform24 + _fp sampling
    functions (sample_bilinear_premul_fp, sample_bicubic_premul_fp) that match
    C++ TDX/TDY/TX/TY computation and ((frac + 0x7FFF) >> 16) weight bias+shift.
    Residual image_scaled divergence reclassified as DIV-024 (boundary premul).

- id: DIV-024
  area: painter/image-boundary-premul
  kind: expected-divergence
  tests: [image_scaled]
  status: passing
  evidence:
    image_scaled: { ch_tol: 19, max_pct: 0.5, max_diff: 19, pct_differ_at_1: 4.79 }
  source: [src/render/interpolation.rs (sample_bicubic_premul_fp)]
  analysis: tests/golden_parity/PARITY_STATUS.md section C5
  notes: >
    Bicubic kernel taps outside the image return alpha=0 with EXTEND_ZERO
    (used for RGBA images in paint_image_full). The premul accumulation then
    unpremultiply step amplifies small alpha-weighted color differences at
    image edges, producing max_diff=19. Interior pixels match at tolerance 1.
    Only affects paint_image_full; 9-slice (paint_border_image) uses
    ImageExtension::Clamp, which is not affected.

- id: DIV-025
  area: painter/9slice-section-boundary
  kind: bug-fixed
  tests: [widget_button_normal, widget_radiobutton]
  status: partially-fixed
  evidence:
    widget_button_normal: { ch_tol: 1, max_diff: 174, pct_differ_at_1: "55.57% (was 59.51%)" }
    widget_radiobutton: { ch_tol: 1, max_diff: 174, pct_differ_at_1: "53.30% (was 57.22%)" }
    widget_listbox: { ch_tol: 3, max_pct: 27.0, pct_differ_at_1: "25.79% (was 31%)" }
  source: [src/render/painter.rs (paint_9slice_section), src/render/interpolation.rs (sample_bilinear_premul_fp)]
  notes: >
    Fixed 4 bugs in paint_9slice_section aligning it with paint_image_colored:
    (1) pixel width from floor(dx+dw)-floor(dx) instead of floor(dw*scale),
    (2) float-based ratio computation using dw_px instead of integer pw,
    (3) float sub-pixel coordinate mapping (col as f64 - dx_px) instead of
    (col - px) as f64, (4) section-scoped bilinear clamping via new
    sample_pixel_section helper (clamps to section bounds, not full image).
    Remaining diff dominated by overlay face texture rendering path
    (button/radiobutton) which covers nearly the entire widget area.

