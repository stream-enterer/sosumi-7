- id: DIV-001
  area: painter/ellipse-polygon
  kind: expected-divergence
  tests: [ellipse_basic, gradient_radial, ellipse_sector]
  status: passing
  evidence:
    ellipse_basic: { ch_tol: 1, max_pct: 0.5, note: "passes ch_tol=0 after blend/coverage fix" }
    gradient_radial: { ch_tol: 50, max_pct: 1.0, max_diff: 248, pct_differ_at_1: 26.10 }
    ellipse_sector: { ch_tol: 1, max_pct: 0.5, note: "pending ch_tol=0 verification" }
  source: [src/render/painter.rs (ellipse_polygon, adaptive_circle_segments, paint_radial_gradient)]
  analysis: tests/golden_parity/PARITY_STATUS.md section C1
  notes: >
    Partially resolved: ellipse_basic now passes at ch_tol=0 (the old max_diff=250
    was entirely from the blend/coverage formula, not polygon approximation).
    ellipse_sector at ch_tol=1, pending verification. gradient_radial still has
    max_diff=248 (26% of pixels) because C++ uses an integer sqrt lookup table for
    radial gradient distance while Rust uses f64 sqrt, producing per-pixel diffs
    across the entire filled area. The sqrt table difference is the sole remaining
    divergence in this entry.

- id: DIV-002
  area: painter/scanline-aa
  kind: bug-fixed
  tests: [polygon_tri, polygon_star, polygon_complex, clip_basic]
  status: passing
  source: [src/render/scanline.rs (Span, make_poly_span, make_edge_span), src/render/painter.rs (blit_span, blend_with_coverage)]
  notes: >
    Fixed: Span opacities changed from u8 (0-255) to i32 (0-4096) 12-bit scale,
    eliminating the two-step 12→8→8 conversion. Final alpha combines color alpha
    and 12-bit coverage in one step: (color_a * opacity + 0x800) >> 12, matching
    C++ PaintScanlineCol. All 4 tests now pass at ch_tol=1 (verified ch_tol=0
    for polygon_star, polygon_complex). Removed cvt() helper.

- id: DIV-003
  area: painter/stroke-expansion
  kind: bug-fixed
  tests: [line_basic, line_dashed, outline_rect, outline_ellipse, outline_polygon, outline_round_rect, bezier_stroked, polyline]
  status: passing
  source: [src/render/painter.rs (blit_span, blend_pixel, blend_with_coverage), src/render/scanline.rs]
  notes: >
    Fixed: The original max_diff=255 diffs were NOT structural boundary differences
    as previously analyzed. They were caused by the blend formula (div-256 truncation
    vs C++ round-div-255) and the two-step coverage conversion (12→8→8 re-modulation).
    Fixing the blend formula to (x * 257 + 0x8073) >> 16 and switching to 12-bit
    Span opacities with single-step alpha resolved all 8 tests. Now pass at ch_tol=1
    (verified ch_tol=0 for line_basic, polyline, outline_ellipse, outline_polygon,
    bezier_stroked).

- id: DIV-004
  area: painter/curve-polygon
  kind: bug-fixed
  tests: [bezier_filled]
  status: passing
  source: [src/render/painter.rs (blend_pixel, blend_with_coverage), src/render/scanline.rs]
  notes: >
    Fixed: Like DIV-003, the original max_diff=255 was NOT from tessellation
    differences. It was caused by the blend formula and coverage conversion
    errors that made every AA boundary pixel wrong. With the round-div-255
    blend and 12-bit coverage, bezier_filled passes at ch_tol=0.

- id: DIV-005
  area: painter/image-scaling
  kind: bug-fixed
  tests: [image_scaled]
  status: passing
  analysis: tests/golden_parity/PARITY_STATUS.md section C5
  notes: >
    Was: f64 coordinate mapping and weight extraction vs C++ 24-bit fixed-point
    integer arithmetic. Fixed by porting to ScaleTransform24 + _fp sampling
    functions (sample_bilinear_premul_fp, sample_bicubic_premul_fp) that match
    C++ TDX/TDY/TX/TY computation and ((frac + 0x7FFF) >> 16) weight bias+shift.
    Residual image_scaled divergence reclassified as DIV-024 (boundary premul).

- id: DIV-024
  area: painter/image-upscale-interpolation
  kind: bug-fixed
  tests: [image_scaled]
  status: passing
  evidence:
    image_scaled: { ch_tol: 1, max_pct: 0.5, max_diff: 1, pct_differ_at_1: "~1.2%" }
  source: [src/render/interpolation.rs (sample_adaptive_premul_fp, interpolate_four_values_adaptive, adaptive_factors), src/render/painter.rs (paint_image_full)]
  analysis: DIV-024_FINDINGS.md
  notes: >
    Root cause: C++ defaults to UQ_ADAPTIVE (anti-ringing Hermite spline with slope/peak
    adaptation via InterpolateFourValuesAdaptive) on AVX2 machines, not UQ_BICUBIC.
    Rust was using Catmull-Rom bicubic, which rings at EXTEND_ZERO boundaries (e.g.
    B channel constant 128 became 147). Fix: ported InterpolateImageAdaptive as
    sample_adaptive_premul_fp with exact slope-limiting/peak-adaptation logic,
    Hermite basis factor table (adaptive_factors, 257 entries), and separable
    Y-then-X structure with FINPREMUL intermediate. Removed dead bicubic code
    (sample_bicubic_premul_fp, bicubic_factors_hi, BICUBIC_TABLE_HI).
    Max diff reduced from 19 to 1, affected pixels from 11.49% to ~1.2%.

- id: DIV-025
  area: painter/9slice-section-boundary
  kind: bug-fixed
  tests: [widget_button_normal, widget_radiobutton]
  status: passing
  evidence:
    widget_button_normal: { ch_tol: 3, max_pct: 1.5, approx_diff: "~0.9% (was ~60%)" }
    widget_radiobutton: { ch_tol: 3, max_pct: 1.5, approx_diff: "~0.8% (was ~57%)" }
    widget_listbox: { ch_tol: 3, max_pct: 24.0, approx_diff: "~23.2% (was ~26%)" }
  source: [src/render/painter.rs (paint_9slice_section, paint_image_colored, paint_image_full, SubPixelEdges), src/render/interpolation.rs (sample_area_fp, sample_bilinear_premul_fp)]
  related: [DIV-018, DIV-019]
  notes: >
    Four-phase fix: (1) 4 bugs in paint_9slice_section boundary computation
    (pixel width, float ratio, sub-pixel mapping, section-scoped clamping),
    (2) 24fp area sampling port (AreaSampleTransform + sample_area_fp matching
    C++ InterpolateImageAreaSampled with per-channel FINPREMUL), (3) border
    geometry fix (InstrumentMoreRound outer_insets s*0.052 vs s*0.085),
    (4) sub-pixel edge blending via SubPixelEdges struct — applies 12-bit
    fractional coverage to all image rendering functions (paint_9slice_section,
    paint_image_colored, paint_image_full) and refactors paint_rect to reuse
    the same coverage model. Reduced IBT_INPUT widgets by 8-9pp (textfield
    24%->15.7%, scalarfield 26%->17.7%, textfield_content 27%->18.9%).
    Residual: text rendering (font shaping) + EXTEND_ZERO premul amplification.

